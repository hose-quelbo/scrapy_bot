<!-- View 2: Account Search -->
<div id="view-account" class="space-y-4 hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="md:col-span-1">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">플랫폼 선택</label>
            <select id="platform-select" class="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-slate-600">
                <option value="tiktok">TikTok</option>
                <option value="instagram">Instagram</option>
            </select>
            <button id="btn-ig-login" class="text-[10px] text-emerald-400/80 hover:text-emerald-300 mt-2 block w-full text-center transition-colors">
                + 인스타그램 웹 로그인 연동 (새 창)
            </button>
        </div>
        <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">계정 아이디 (Username)</label>
            <div class="flex">
                <span class="inline-flex items-center px-3 rounded-l-xl border border-r-0 border-slate-800 bg-slate-950 text-slate-500 text-sm">@</span>
                <input type="text" id="account-input" placeholder="username" 
                    class="flex-1 bg-slate-950 border border-slate-800 text-slate-100 rounded-r-xl px-4 py-3 text-sm focus:outline-none focus:border-slate-600">
            </div>
        </div>
    </div>
    <button id="btn-search-account" disabled class="w-full py-3 rounded-xl font-semibold text-sm bg-slate-100 text-slate-950 hover:bg-white transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        계정 전체 미디어 스캔
    </button>

    <!-- Account Tab Dedicated Console -->
    <div class="pt-2">
        <div class="flex justify-between items-center mb-2 px-1">
            <span class="text-[11px] font-mono text-emerald-400/70 uppercase tracking-wider">계정 스캔 콘솔 로그</span>
            <button id="btn-clear-log-account" class="text-[11px] text-slate-500 hover:text-emerald-300 transition-colors">Clear</button>
        </div>
        <div class="bg-black/40 border border-white/5 rounded-xl p-3.5 font-mono text-xs h-36 overflow-y-auto custom-scrollbar" id="log-container-account">
            <ul id="log-output-account" class="space-y-1">
                <li class="text-slate-500">[Account Mode] 준비 완료</li>
            </ul>
        </div>
    </div>
</div>
