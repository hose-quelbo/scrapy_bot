<!-- History Modal -->
<div id="history-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-md hidden items-center justify-center p-4">
    <div class="glass-panel rounded-2xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
            <h3 class="text-xl font-bold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                내부 로컬 다운로드 기록
            </h3>
            <div class="flex gap-2">
                <button id="btn-clear-history" class="glass-button px-3 py-1.5 text-xs font-semibold rounded-lg !text-rose-400 hover:!border-rose-400/40 hover:!bg-rose-400/10">
                    전체 삭제
                </button>
                <button id="btn-close-history-modal" class="text-slate-400 hover:text-emerald-300 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        
        <div class="p-0 overflow-y-auto custom-scrollbar flex-1">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-black/40 border-b border-white/5 text-slate-400 font-medium">
                        <th class="py-3 px-4 w-28">시간</th>
                        <th class="py-3 px-4 w-20">타입</th>
                        <th class="py-3 px-4">제목 (파일명)</th>
                        <th class="py-3 px-4 w-40 font-mono text-xs text-center">동작</th>
                    </tr>
                </thead>
                <tbody id="history-table-body" class="divide-y divide-white/5">
                    <!-- History items injected here -->
                </tbody>
            </table>
        </div>
        <div class="p-4 border-t border-white/5 bg-emerald-900/10 text-xs text-emerald-200/70 text-center font-medium">
            🔒 본 다운로드 기록은 외부 서버로 <strong class="text-emerald-300">절대 전송되지 않으며</strong>, 사용자님의 브라우저(Local Storage) 내부에만 <strong class="text-emerald-300">100% 안전하게 보관</strong>됩니다. 타인과 공유되지 않습니다.
        </div>
    </div>
</div>

<!-- Redownload Modal (previously hidden in JS, now in HTML) -->
<div id="redownload-modal" class="fixed inset-0 z-[60] bg-black/60 backdrop-blur-md hidden items-center justify-center p-4">
    <div class="glass-panel w-full max-w-sm rounded-2xl border border-amber-500/20 shadow-2xl flex flex-col overflow-hidden">
        <div class="p-4 border-b border-amber-500/10 bg-gradient-to-r from-amber-500/10 to-transparent flex justify-between items-center">
            <h3 class="text-amber-400 font-bold flex items-center gap-2">
                ⚠️ 중복 다운로드 경고
            </h3>
            <button id="btn-close-redownload-modal" class="text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <p class="text-sm text-slate-300">다음 항목들은 이미 다운로드 기록이 있습니다. 다시 다운로드 하시겠습니까?</p>
            <ul id="redownload-list" class="text-xs text-amber-200/80 bg-black/40 p-3 rounded-lg max-h-32 overflow-y-auto space-y-1">
            </ul>
        </div>
        <div class="p-4 border-t border-white/5 flex gap-2 justify-end">
            <button id="btn-cancel-redownload" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-slate-700 transition-colors">
                취소
            </button>
            <button id="btn-confirm-redownload" class="px-4 py-2 bg-amber-500 text-black rounded-lg text-xs font-bold hover:bg-amber-400 transition-colors">
                다시 다운로드
            </button>
        </div>
    </div>
</div>
