<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="neonEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Outer Ring (Camera Lens/Frame) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#neonEmerald)" stroke-width="24" filter="url(#glow)"/>
  
  <!-- Download Arrow -->
  <path d="M256 140 L256 320 M180 260 L256 340 L332 260" fill="none" stroke="url(#neonEmerald)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Media / Photo Frame representation at bottom -->
  <path d="M160 380 L352 380" fill="none" stroke="#38bdf8" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>
</svg>
